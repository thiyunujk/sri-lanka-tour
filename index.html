<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sri Lanka Private Tour</title>
  
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="text-slate-800 antialiased selection:bg-emerald-200 selection:text-emerald-900">

  <!-- Mobile Container (Max width enforced for mobile-first feel on desktop) -->
  <div class="max-w-md mx-auto bg-white min-h-screen shadow-2xl relative pb-24 border-x border-slate-100">
    
    <!-- Sticky Header -->
    <header class="sticky top-0 z-50 bg-white/85 backdrop-blur-lg border-b border-slate-200/50 px-5 py-3.5 flex justify-between items-center shadow-sm">
      <div>
        <h1 class="text-[18px] font-bold bg-clip-text text-transparent bg-gradient-to-r from-emerald-600 to-teal-500 tracking-tight" id="header-title">Sri Lanka Tour</h1>
        <p class="text-[11px] text-slate-400 font-semibold uppercase tracking-widest mt-0.5" id="header-dates">August 10 - 20, 2026</p>
      </div>
      
      <!-- Bilingual Toggle Button -->
      <button id="lang-toggle" class="flex items-center justify-center gap-1.5 bg-slate-50 text-emerald-700 px-3.5 py-2 rounded-full font-bold text-xs shadow-[0_2px_10px_-3px_rgba(16,185,129,0.3)] active:scale-95 transition-all border border-emerald-100 hover:bg-emerald-50 focus:outline-none">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129" />
        </svg>
        <span id="lang-text" class="min-w-[18px] text-center tracking-wide">EN</span>
      </button>
    </header>

    <!-- Hero Intro Section -->
    <div class="px-5 py-8 bg-gradient-to-br from-slate-900 to-slate-800 text-white relative overflow-hidden">
      <!-- Ambient Blurs for Premium Feel -->
      <div class="absolute -top-10 -right-10 w-36 h-36 bg-emerald-500 rounded-full mix-blend-multiply filter blur-3xl opacity-50"></div>
      <div class="absolute -bottom-10 -left-10 w-36 h-36 bg-teal-500 rounded-full mix-blend-multiply filter blur-3xl opacity-50"></div>
      
      <div class="relative z-10">
        <div class="flex items-center gap-2 mb-3">
          <span class="bg-white/10 border border-white/20 px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wide backdrop-blur-md">Private Group of 5</span>
          <span class="bg-white/10 border border-white/20 px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wide backdrop-blur-md">11 Days</span>
        </div>
        <h2 class="text-2xl font-bold leading-tight mb-2" id="hero-title">Your Detailed Itinerary</h2>
        <p class="text-slate-300 text-xs leading-relaxed max-w-[90%]" id="hero-subtitle">Tap any day header to collapse or expand its details.</p>
      </div>
    </div>

    <!-- Main Accordion List -->
    <main class="px-4 py-6 space-y-4 relative z-20 -mt-3" id="itinerary-container">
      <!-- Day cards dynamically injected here by Javascript -->
    </main>

    <!-- Floating Bottom Navigation -->
    <div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white/95 backdrop-blur-lg border-t border-slate-200 pb-safe pt-2 px-3 flex justify-between shadow-[0_-10px_30px_rgba(0,0,0,0.06)] z-50">
      <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="flex flex-1 flex-col items-center p-2 text-slate-400 hover:text-emerald-600 transition-colors active:scale-95 focus:outline-none">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 11l7-7 7 7M5 19l7-7 7 7" />
        </svg>
        <span class="text-[9px] font-bold uppercase tracking-widest text-center" id="btn-top">Scroll to Top</span>
      </button>
      
      <button onclick="openModal('modal-checklist')" class="flex flex-1 flex-col items-center p-2 text-slate-400 hover:text-emerald-600 transition-colors active:scale-95 focus:outline-none">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
        </svg>
        <span class="text-[9px] font-bold uppercase tracking-widest text-center" id="btn-checklist">Checklist</span>
      </button>

      <button onclick="openModal('modal-docs')" class="flex flex-1 flex-col items-center p-2 text-slate-400 hover:text-emerald-600 transition-colors active:scale-95 focus:outline-none">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0m-5 8a2 2 0 100-4 2 2 0 000 4zm0 0c1.306 0 2.417.835 2.83 2M9 14a3.001 3.001 0 00-2.83 2M15 11h3m-3 4h2" />
        </svg>
        <span class="text-[9px] font-bold uppercase tracking-widest text-center" id="btn-docs">Documents</span>
      </button>

      <button onclick="openModal('modal-group-votes')" class="flex flex-1 flex-col items-center p-2 text-slate-400 hover:text-emerald-600 transition-colors active:scale-95 focus:outline-none">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
        <span class="text-[9px] font-bold uppercase tracking-widest text-center" id="btn-group-votes">グループ投票</span>
      </button>
    </div>

    <!-- Modals Overlay -->
    <div id="modal-overlay" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] opacity-0 pointer-events-none transition-opacity duration-300" onclick="closeAllModals()"></div>

    <!-- Packing Checklist Modal -->
    <div id="modal-checklist" class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white rounded-t-[24px] z-[70] transform translate-y-full transition-transform duration-300 shadow-[0_-10px_40px_rgba(0,0,0,0.1)] flex flex-col max-h-[85vh]">
      <div class="flex justify-between items-center p-5 border-b border-slate-100">
        <h3 class="text-lg font-bold text-slate-800" id="modal-title-checklist">Packing Checklist</h3>
        <button onclick="closeAllModals()" class="p-2 bg-slate-100 text-slate-500 rounded-full hover:bg-slate-200 transition-colors focus:outline-none"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg></button>
      </div>
      <div class="p-5 overflow-y-auto pb-safe space-y-3" id="checklist-container">
        <!-- Checklist items injected here -->
      </div>
    </div>

    <!-- Documents Hub Modal -->
    <div id="modal-docs" class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white rounded-t-[24px] z-[70] transform translate-y-full transition-transform duration-300 shadow-[0_-10px_40px_rgba(0,0,0,0.1)] flex flex-col max-h-[85vh]">
      <div class="flex justify-between items-center p-5 border-b border-slate-100">
        <h3 class="text-lg font-bold text-slate-800" id="modal-title-docs">Important Documents</h3>
        <button onclick="closeAllModals()" class="p-2 bg-slate-100 text-slate-500 rounded-full hover:bg-slate-200 transition-colors focus:outline-none"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg></button>
      </div>
      <div class="p-5 overflow-y-auto pb-safe space-y-4" id="docs-container">
        <!-- Document items injected here -->
      </div>
    </div>

    <!-- Identity Modal -->
    <div id="modal-identity" class="fixed inset-0 flex items-center justify-center z-[80] opacity-0 pointer-events-none transition-opacity duration-300">
      <div class="bg-white rounded-2xl w-[90%] max-w-sm p-6 shadow-2xl transform scale-95 transition-transform duration-300" id="identity-box">
        <h3 class="text-xl font-bold text-slate-800 mb-2" id="identity-title">誰が投票しますか？</h3>
        <p class="text-sm text-slate-500 mb-5" id="identity-subtitle">名前を選択してください。</p>
        <div class="space-y-3" id="voter-buttons">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>

    <!-- Hotel Selection Modal -->
    <div id="modal-hotel-selection" class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white rounded-t-[24px] z-[70] transform translate-y-full transition-transform duration-300 shadow-[0_-10px_40px_rgba(0,0,0,0.1)] flex flex-col max-h-[90vh]">
      <div class="flex justify-between items-center p-5 border-b border-slate-100">
        <div>
          <h3 class="text-lg font-bold text-slate-800" id="modal-title-hotel-dest">ホテル</h3>
          <p class="text-[10px] text-slate-500 font-medium uppercase tracking-wider mt-0.5" id="modal-subtitle-hotel">第1、第2、第3希望を選択</p>
        </div>
        <button onclick="closeAllModals()" class="p-2 bg-slate-100 text-slate-500 rounded-full hover:bg-slate-200 transition-colors focus:outline-none"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg></button>
      </div>

      <div id="vote-deadline-banner-hotel" class="px-4 py-2 bg-amber-50 border-b border-amber-100 text-amber-700 text-[11px] font-bold text-center"></div>

      <!-- Tier Tabs -->
      <div class="flex px-4 pt-2 border-b border-slate-200">
        <button onclick="switchHotelTier('Premium')" id="tab-Premium" class="flex-1 py-3 text-sm font-semibold border-b-2 border-transparent text-slate-500 transition-colors">プレミアム</button>
        <button onclick="switchHotelTier('Standard')" id="tab-Standard" class="flex-1 py-3 text-sm font-semibold border-b-2 border-transparent text-slate-500 transition-colors">スタンダード</button>
        <button onclick="switchHotelTier('Economy')" id="tab-Economy" class="flex-1 py-3 text-sm font-semibold border-b-2 border-transparent text-slate-500 transition-colors">エコノミー</button>
      </div>

      <div class="p-4 overflow-y-auto pb-safe flex-1 bg-slate-50" id="hotel-list-container">
        <!-- Hotel cards injected here -->
      </div>
    </div>

    <!-- Group Votes Dashboard Modal -->
    <div id="modal-group-votes" class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white rounded-t-[24px] z-[70] transform translate-y-full transition-transform duration-300 shadow-[0_-10px_40px_rgba(0,0,0,0.1)] flex flex-col max-h-[90vh]">
      <div class="flex justify-between items-center p-5 border-b border-slate-100">
        <h3 class="text-lg font-bold text-slate-800" id="modal-title-group-votes">グループ投票結果</h3>
        <button onclick="closeAllModals()" class="p-2 bg-slate-100 text-slate-500 rounded-full hover:bg-slate-200 transition-colors focus:outline-none"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg></button>
      </div>
      <div id="vote-deadline-banner-group" class="px-4 py-2 bg-amber-50 border-b border-amber-100 text-amber-700 text-[11px] font-bold text-center"></div>
      <div class="p-5 overflow-y-auto pb-safe flex-1 bg-slate-50" id="group-votes-container">
        <!-- Votes injected here -->
      </div>
    </div>

  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  
  <!-- Custom Scripts -->
  <script src="js/hotelData.js"></script>
  <script src="js/voting.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
